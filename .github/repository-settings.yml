# Repository Configuration for Leave Management Flutter App

# Disable GitHub Codespaces Prebuilds
codespaces:
  prebuilds:
    enabled: false
  
# Disable automatic dependency updates  
dependabot:
  enabled: false

# Reduce notification noise
notifications:
  dependabot: false
  security_alerts: true  # Keep security alerts enabled
  
# Workflow settings
actions:
  permissions:
    contents: read
    deployments: write