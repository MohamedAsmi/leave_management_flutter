name: Flutter Web CI/CD

on:
  push:
    branches: [ main, master ]
    # Only trigger on code changes, not documentation
    paths-ignore:
      - '**.md'
      - '.devcontainer/**'
      - '.github/dependabot.yml'
      - '.github/repository-settings.yml'
      - 'DISABLE_CODESPACES.md'
      - 'CI_CD_SETUP.md'
      - '.codespaces-disabled'
      - 'analyze*.txt'
  pull_request:
    branches: [ main, master ]
    paths-ignore:
      - '**.md'
      - '.devcontainer/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Cache Flutter dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.pub-cache
          .dart_tool/
        key: flutter-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
        restore-keys: |
          flutter-${{ runner.os }}-

    - name: Get Flutter dependencies
      run: flutter pub get

    - name: Run tests
      run: flutter test

    - name: Analyze code
      run: |
        echo "Running Flutter analysis..."
        # Run analysis and capture output
        flutter analyze --no-fatal-infos > analysis_output.txt 2>&1 || true
        
        # Show analysis results  
        cat analysis_output.txt
        
        # Check for warnings and errors (but allow info-level issues)
        if grep -E "(warning|error)" analysis_output.txt; then
          echo "❌ Analysis found warnings or errors - deployment blocked"
          exit 1
        else
          echo "✅ Analysis passed - only info-level issues found (allowed)"
        fi

    - name: Build Flutter web (production)
      run: |
        # Ensure we're in production mode
        echo "Setting production environment..."
        if grep -q "Environment\.development" lib/core/config/environment.dart; then
          sed -i 's/Environment\.development/Environment.production/' lib/core/config/environment.dart
          echo "✅ Switched to production environment"
        else
          echo "✅ Already in production environment"
        fi
        
        # Build with error checking
        echo "Building Flutter web app..."
        flutter build web --release --base-href /leave-app/
        
        # Verify build succeeded
        if [ ! -d "build/web" ]; then
          echo "❌ Build failed - no output directory"
          exit 1
        fi
        
        echo "✅ Build completed successfully"

    - name: Prepare deployment files
      run: |
        # Create deployment directory
        mkdir -p deploy
        
        # Copy built web files to deploy directory
        cp -r build/web/* deploy/
        
        # Create deployment script
        cat > deploy_script.sh << 'EOF'
        #!/bin/bash
        set -e
        
        echo "Starting deployment..."
        
        # Navigate to web directory
        cd /var/www/html/leave_management/leave_management_flutter/
        
        # Backup current deployment
        if [ -d "backup" ]; then
          rm -rf backup
        fi
        
        if [ "$(ls -A . 2>/dev/null)" ]; then
          mkdir -p backup
          mv * backup/ 2>/dev/null || true
        fi
        
        echo "Deployment completed successfully!"
        EOF
        
        chmod +x deploy_script.sh

    - name: Deploy to server
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        password: ${{ secrets.PASSWORD }}
        port: 22
        script: |
          # Create deployment directory if it doesn't exist
          mkdir -p /var/www/html/leave_management/leave_management_flutter/
          
          # Navigate to deployment directory
          cd /var/www/html/leave_management/leave_management_flutter/
          
          # Backup current files
          if [ -d "backup" ]; then
            rm -rf backup
          fi
          
          if [ "$(ls -A . 2>/dev/null)" ]; then
            mkdir -p backup
            mv * backup/ 2>/dev/null || true
          fi
          
          echo "Prepared for file upload..."

    - name: Upload files to server
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      uses: appleboy/scp-action@v0.1.4
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        password: ${{ secrets.PASSWORD }}
        port: 22
        source: "build/web/*"
        target: "/var/www/html/leave_management/leave_management_flutter/"
        strip_components: 2

    - name: Set proper permissions
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        password: ${{ secrets.PASSWORD }}
        port: 22
        script: |
          # Set proper permissions
          cd /var/www/html/leave_management/leave_management_flutter/
          chown -R www-data:www-data .
          find . -type f -exec chmod 644 {} \;
          find . -type d -exec chmod 755 {} \;
          
          echo "Deployment completed successfully!"